name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - '**.kt'
      - '**.kts'
      - '**.xml'

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gemini AI Code Review
        uses: google-gemini/gemini-github-action@main
        with:
          apiKey: ${{ secrets.GEMINI_API_KEY }}
          model: "gemini-1.5-flash"
          systemInstruction: |
            Você é um Engenheiro Android Sênior no iFood. 
            Analise o PR focando em SOLID, Clean Architecture, Coroutines (Dispatchers.IO), 
            Resource Pattern e Testes Unitários. 
            Ignore arquivos de tradução. Responda em Português.
